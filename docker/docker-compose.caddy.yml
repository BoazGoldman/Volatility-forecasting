services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: volatility-backend
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: caddy:2
    container_name: volatility-caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
